services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  livekit-server:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    command: ["--config", "/etc/livekit/livekit.yaml", "--dev"]
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "7880:7880"
      - "7881:7881"
      # Narrowed to match livekit.yaml port_range_end — binding the wider range
      # races with ephemeral UDP sockets and fails on busy hosts. Prefer
      # network_mode: host in production to avoid Docker port-map overhead.
      - "50000-50100:50000-50100/udp"
    volumes:
      - ./livekit-server/livekit.yaml:/etc/livekit/livekit.yaml:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O- http://localhost:7880/ >/dev/null 2>&1 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  agent:
    build:
      context: ./agent
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      livekit-server:
        condition: service_healthy
    env_file:
      - ./.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./agent:/app
    ports:
      - "${AGENT_METRICS_PORT:-9090}:${AGENT_METRICS_PORT:-9090}"
      - "8081:8081"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c 'import urllib.request,sys; sys.exit(0 if urllib.request.urlopen(\"http://localhost:8081/\",timeout=2).status==200 else 1)' || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: ["python", "agent.py", "start"]

  token-server:
    build:
      context: ./token-server
    restart: unless-stopped
    depends_on:
      livekit-server:
        condition: service_started
    env_file:
      - ./.env
    volumes:
      - ./token-server:/app
    ports:
      - "${TOKEN_SERVER_PORT:-8080}:${TOKEN_SERVER_PORT:-8080}"
    command: ["sh", "-c", "uvicorn server:app --host 0.0.0.0 --port ${TOKEN_SERVER_PORT:-8080}"]

  demo-frontend:
    build:
      context: ./demo
    profiles:
      - demo
    restart: unless-stopped
    depends_on:
      livekit-server:
        condition: service_healthy
      agent:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:-devkey}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:-secret}
      - LIVEKIT_URL=${LIVEKIT_PUBLIC_URL:-ws://localhost:7880}
      - AGENT_NAME=${AGENT_NAME:-nusuk-agent}
      - ASR_URL=${ASR_URL:-http://host.docker.internal:8102}
      - ASR_TOKEN=${CUSTOM_STT_ACCESS_TOKEN}
      - PTT_BROWSER_ASR_URL=http://localhost:8102/api/transcribe/
      - TTS_URL=${TTS_URL:-http://host.docker.internal:8000}
      - NUSUK_URL=${CUSTOM_LLM_URL:-https://dev.nusukai.com}
      - NUSUK_CLIENT_ID=${CUSTOM_LLM_CLIENT_ID}
      - NUSUK_CLIENT_SECRET=${CUSTOM_LLM_CLIENT_SECRET}
    ports:
      - "3000:3000"

  prometheus:
    image: prom/prometheus:latest
    profiles:
      - observability
    restart: unless-stopped
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    ports:
      - "${PROMETHEUS_PORT:-9091}:9090"

  grafana:
    image: grafana/grafana:latest
    profiles:
      - observability
    restart: unless-stopped
    depends_on:
      - prometheus
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
    ports:
      - "${GRAFANA_PORT:-3001}:3000"

volumes:
  prometheus-data:
  grafana-data:
