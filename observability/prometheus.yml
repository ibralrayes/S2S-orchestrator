global:
  scrape_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: agent
    static_configs:
      - targets: ['agent:9090']
        labels:
          service: s2s-agent

  - job_name: livekit
    static_configs:
      - targets: ['livekit-server:6789']
        labels:
          service: livekit-server

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
